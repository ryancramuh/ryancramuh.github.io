# =============================================================================
# study.yml - data source for the Weekly Study Dashboard (/dashboard.html)
# -----------------------------------------------------------------------------
# EDIT THIS FILE to change what shows on the dashboard. The page (dashboard.html)
# is a pure template: it loops over `weeks` and renders each item as a checkable
# task with category tag + resource links. No HTML editing required.
#
# SCHEMA
#   updated: "YYYY-MM-DD"          # shown in the dashboard header
#   weeks:                          # list, rendered newest-first as written
#     - id: <slug>                  # REQUIRED, stable & unique. Used as the
#                                   #   localStorage key prefix for checkbox
#                                   #   state - DO NOT rename an existing id or
#                                   #   users lose their checked progress.
#       label: "<short tag>"        # e.g. "Week of Jul 6" (mono eyebrow)
#       title: "<week theme>"       # headline for the column
#       focus: "<one-line focus>"   # optional subtitle
#       items:                      # the tasks
#         - text: "<what to study>" # REQUIRED
#           cat:  <category key>    # one of the keys below (drives tag color)
#           note: "<optional hint>" # optional secondary line
#           resources:              # optional list of links
#             - { label: "<name>", url: "<https url>" }
#
# CATEGORY KEYS (color-coded, validated palette): must be one of
#   rtl     RTL / HDL design
#   pd      Physical design / PnR / STA
#   asic    ASIC flow / RTL-to-GDSII / PDK
#   verif   Verification / UVM / formal
#   arch    Computer architecture / microarch
#   dsp     DSP / signal processing
#   eda     EDA tools / scripting / infra
#   papers  Papers / theory / reading
# =============================================================================

