# =============================================================================
# events.yml  —  data source for the Industry Events page (/events.html)
# -----------------------------------------------------------------------------
# AUTOMATED REFRESH TARGET.  A scheduled agent re-researches semiconductor /
# RTL / physical-design / ASIC events and OVERWRITES the `events:` list below.
# The events.html page is a pure template — it only reads this file — so the
# refresh job never has to touch HTML. Keep the schema stable.
#
# INCLUSION FILTER (do not add events that fail this):
#   Include an event ONLY IF it is EITHER
#     (a) online / virtual / livestreamed, OR
#     (b) in-person within ~1 hour driving of San Jose, CA
#         (San Jose, Santa Clara, Sunnyvale, Palo Alto, Milpitas, Fremont,
#          San Francisco, Berkeley, Mountain View, Cupertino all qualify).
#   Drop events whose date is in the past relative to the refresh date.
#   Prefer RTL / verification / physical design / ASIC / EDA / architecture /
#   semiconductor-process relevance. Sort soonest-first.
#
# SCHEMA (every field is a plain string unless noted)
#   refreshed: "YYYY-MM-DD"     # set to the date the list was last regenerated
#   events:                      # LIST — this is the part the agent overwrites
#     - name:  "<event name>"                REQUIRED
#       date:  "<YYYY-MM-DD>"                REQUIRED, start date, ISO. Used for
#                                            #  sorting AND to render the date chip.
#       date_display: "<human range>"        optional, e.g. "Aug 23-25, 2026".
#                                            #  Falls back to `date` if omitted.
#       mode:  online | local               REQUIRED. "local" = in-person Bay Area,
#                                            #  "online" = virtual/livestream/hybrid.
#       location: "<venue, city>" or "Online"  REQUIRED
#       url:   "<https link>"               REQUIRED
#       desc:  "<one-line description>"      REQUIRED
#       tags:  [rtl, pd, asic, verif, arch, eda, papers]   optional list
#       tentative: true                     optional; set when the date is not yet
#                                            #  officially confirmed (renders a note).
# =============================================================================

